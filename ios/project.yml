name: ReelFit
options:
  bundleIdPrefix: com.reelfit
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Set your Apple Developer Team ID here (Xcode > Settings > Accounts),
    # or leave blank and pick the team in the Signing tab per target.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  ReelFit:
    type: application
    platform: iOS
    sources:
      - path: ReelFit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfit.app
        INFOPLIST_FILE: ReelFit/Info.plist
        CODE_SIGN_ENTITLEMENTS: ReelFit/ReelFit.entitlements
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: ReelFitShareExtension
        embed: true

  ReelFitShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ReelFitShareExtension
      - path: ReelFit/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfit.app.share
        INFOPLIST_FILE: ReelFitShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ReelFitShareExtension/ShareExtension.entitlements
        GENERATE_INFOPLIST_FILE: NO
