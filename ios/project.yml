name: Glowup
options:
  bundleIdPrefix: com.glowup
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Set your Apple Developer Team ID here (Xcode > Settings > Accounts),
    # or leave blank and pick the team in the Signing tab per target.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Glowup:
    type: application
    platform: iOS
    sources:
      - path: Glowup
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.glowup.app
        INFOPLIST_FILE: Glowup/Info.plist
        CODE_SIGN_ENTITLEMENTS: Glowup/Glowup.entitlements
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: GlowupShareExtension
        embed: true

  GlowupShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: GlowupShareExtension
      - path: Glowup/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.glowup.app.share
        INFOPLIST_FILE: GlowupShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: GlowupShareExtension/ShareExtension.entitlements
        GENERATE_INFOPLIST_FILE: NO
